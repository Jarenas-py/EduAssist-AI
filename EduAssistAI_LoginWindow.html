<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col items-center justify-center">
<!-- Main Content Canvas -->
<main class="w-full max-w-md mx-auto px-margin-mobile flex-grow flex flex-col items-center justify-center space-y-2xl">
<!-- Branding / Header -->
<div class="text-center space-y-sm w-full">
<div class="inline-flex items-center justify-center w-20 h-20 bg-surface-container rounded-2xl shadow-sm mb-md">
<span class="material-symbols-outlined text-[40px] text-primary" data-icon="school">school</span>
</div>
<h1 class="font-h1 text-h1 text-primary">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to your EduAssist AI account</p>
</div>
<!-- Login Form Card -->
<div class="w-full bg-surface-container-lowest rounded-xl p-lg shadow-sm border border-surface-variant">
<form class="space-y-lg w-full">
<!-- Email Field -->
<div class="space-y-xs w-full">
<label class="block font-label-md text-label-md text-on-surface" for="email">Email</label>
<div class="relative w-full">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant" data-icon="mail">mail</span>
</div>
<input class="w-full pl-[44px] pr-md py-sm bg-surface-bright border border-outline-variant rounded-lg text-on-surface font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-primary transition-all min-h-[48px]" id="email" name="email" placeholder="educator@deped.gov.ph" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs w-full">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<div class="relative w-full">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant" data-icon="lock">lock</span>
</div>
<input class="w-full pl-[44px] pr-md py-sm bg-surface-bright border border-outline-variant rounded-lg text-on-surface font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-primary transition-all min-h-[48px]" id="password" name="password" placeholder="••••••••" required="" type="password">
</div>
</div>
<!-- Login Button -->
<button class="w-full bg-primary hover:bg-surface-tint text-on-primary font-label-md text-label-md rounded-lg py-sm px-md flex items-center justify-center gap-sm transition-colors min-h-[48px] shadow-sm active:opacity-80" type="submit"><span class="material-symbols-outlined text-[20px]" data-icon="login">login</span>
</button>
</form>
</div>
</main>

<script>
    // 1. Grab the form and the input boxes from the HTML
    const loginForm = document.querySelector('form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    // 2. Listen for when the user clicks the Submit/Login button
    loginForm.addEventListener('submit', async (e) => {
        // Stop the browser from refreshing the page (which is the default form behavior)
        e.preventDefault(); 

        // 3. Get the exact text the user typed
        const userEmail = emailInput.value;
        const userPassword = passwordInput.value;

        try {
            // 4. Send the data to your Python backend
            const response = await fetch("http://127.0.0.1:8000/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: userEmail, password: userPassword })
            });
            
            const data = await response.json();

            // 5. Check if login was successful
           // 5. Check if login was successful
            if (response.ok) {
                // Save the ID and the First Name!
                localStorage.setItem("eduassist_user_id", data.user_id);
                localStorage.setItem("eduassist_first_name", data.first_name);
                
                // Redirect to the main app
                window.location.href = "EduAssistAI_LandingPage.html";
            } else { 
                // If Python sends back a 401 (Incorrect password), tell the user
                alert(data.detail || "Login failed. Please check your credentials.");
            }
        } catch (error) {
            console.error("Login Error:", error);
            alert("Could not connect to the server. Is your Python backend running?");
        }
    });
</script>
