<form class="space-y-xl">

</div>
<div>

</div>
<div>

<input class="w-full h-12 px-sm border border-outline rounded bg-surface focus:border-primary focus:ring-0 input-focus-ring transition-shadow text-on-surface font-body-md" id="lastName" required="" type="text">
</div><div>
<label class="block font-label-md text-label-md text-on-surface mb-base" for="dob">Date of Birth</label>
<input class="w-full h-12 px-sm border border-outline rounded bg-surface focus:border-primary focus:ring-0 input-focus-ring transition-shadow text-on-surface font-body-md" id="dob" placeholder="mm/dd/yyyy" required="" type="date">
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div>

<input class="w-full h-12 px-sm border border-outline rounded bg-surface focus:border-primary focus:ring-0 input-focus-ring transition-shadow text-on-surface font-body-md" id="email" placeholder="name@deped.gov.ph" required="" type="email">
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-base" for="password">Password</label>
<div class="relative">
<input class="w-full h-12 px-sm border border-outline rounded bg-surface focus:border-primary focus:ring-0 input-focus-ring transition-shadow text-on-surface font-body-md" id="password" required="" type="password">

</div>

<div class="pt-lg border-t border-outline-variant/30 flex justify-end gap-sm">
<a href="EduAssistAI_LandingPage.html">
	<button class="px-lg h-12 rounded bg-transparent border border-outline text-on-surface font-label-md hover:bg-surface-variant transition-colors" type="button">Cancel</button></a>
<button class="px-lg h-12 rounded bg-primary text-on-primary font-label-md hover:bg-primary-container transition-colors shadow-sm flex items-center gap-xs" type="submit">
                            Complete Registration

</button>

<!-- Footer -->
<footer class="bg-surface-container-low dark:bg-inverse-surface text-primary dark:text-primary-fixed-dim font-caption text-caption w-full py-xl px-margin-mobile md:px-margin-desktop flex flex-col md:flex-row justify-between items-center gap-md border-t border-outline-variant/30 mt-auto z-10 relative"><div class="w-full text-center text-on-surface-variant/80 dark:text-on-surface-variant/80">Published by Jarenas-py</div></footer>

<script>
    const registerForm = document.querySelector('form');
    
    registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Gather the data from the form
       const data = {
            firstName: document.getElementById('firstName').value,
            middleName: document.getElementById('middleName').value,
            lastName: document.getElementById('lastName').value,
            dob: document.getElementById('dob').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            position: document.getElementById('position').value,
            schoolName: document.getElementById('schoolName').value, // NEW
            phone1: document.getElementById('phone1').value,
            phone2: document.getElementById('phone2').value,
            blockLot: document.getElementById('blockLot').value,
            street: document.getElementById('street').value,
            village: document.getElementById('village').value,
            city: document.getElementById('city').value,
            region: document.getElementById('region').value,
            zip: document.getElementById('zip').value,
            country: document.getElementById('country').value
        }; 
        
        try {
            // Send to Python
            const response = await fetch("http://127.0.0.1:8000/api/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            
            if (response.ok) {
                alert("Registration successful! Please log in.");
                window.location.href = "EduAssistAI_LandingPage.html"; // Redirect to Landing Page
            } else {
                const errData = await response.json();
                alert(errData.detail || "Registration failed.");
            }
        } catch (error) {
            console.error("Registration Error:", error);
            alert("Could not connect to the server.");
        }
    });
</script>
