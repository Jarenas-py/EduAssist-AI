<script>
  /* ── Sidebar toggles ── */
  (function () {
    function lockWidth(el) {
      el.style.width    = el.offsetWidth + 'px';
      el.style.minWidth = el.offsetWidth + 'px';
      el.style.maxWidth = el.offsetWidth + 'px';
    }

    function setupToggle(toggleBtnId, sidebarId) {
      const btn     = document.getElementById(toggleBtnId);
      const sidebar = document.getElementById(sidebarId);
      if (!btn || !sidebar) return;

      const icon = btn.querySelector('.toggle-icon');
      let isOpen = true;

      btn.addEventListener('click', function () {
        if (isOpen) {
          lockWidth(sidebar);
          requestAnimationFrame(function () {
            sidebar.classList.add('sidebar-collapsed');
            icon.classList.add('rotated');
          });
        } else {
          sidebar.classList.remove('sidebar-collapsed');
          icon.classList.remove('rotated');
          sidebar.addEventListener('transitionend', function clearInline() {
            sidebar.style.width    = '';
            sidebar.style.minWidth = '';
            sidebar.style.maxWidth = '';
            sidebar.removeEventListener('transitionend', clearInline);
          });
        }
        isOpen = !isOpen;
      });
    }

    setupToggle('left-toggle',  'left-sidebar');
    setupToggle('right-toggle', 'right-sidebar');
  })();

  /* ── Login Modal ── */
  (function () {
    const overlay  = document.getElementById('login-overlay');
    const openBtn  = document.getElementById('open-login-btn');
    const closeBtn = document.getElementById('login-close');
    const backdrop = document.getElementById('login-backdrop');

    function openModal() {
      overlay.classList.add('open');
    }

    function closeModal() {
      overlay.classList.remove('open');
    }

    openBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    backdrop.addEventListener('click', closeModal);

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeModal();
    });
  })();
</script>

<script>
    const BACKEND_URL = "http://127.0.0.1:8000/api/generate-dll";

    // Helpers for Base64 <-> Blob
    function dataURLtoBlob(dataurl) {
        let arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
            bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
        while(n--){ u8arr[n] = bstr.charCodeAt(n); }
        return new Blob([u8arr], {type:mime});
    }

    function blobToBase64(blob) {
        return new Promise((resolve, _) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.readAsDataURL(blob);
        });
    }

    // Render the document to the canvas
    function renderDocument() {
        const savedData = sessionStorage.getItem("draftDocument");
        if (!savedData) return;
        const docBlob = dataURLtoBlob(savedData);
        const container = document.getElementById("document-canvas");
        
        // Clear previous render
        container.innerHTML = ""; 
        
        docx.renderAsync(docBlob, container).then(() => {
            console.log("Document rendered successfully!");
        }).catch(err => console.error("Rendering error:", err));
    }

    // --- CHAT UI FUNCTIONS ---
    const chatHistory = document.getElementById('chat-history');
    
    function addAIMessage(text, isUpdate = false) {
        let updateCard = "";
        if (isUpdate) {
            updateCard = `
            <div class="mt-3 p-3 bg-surface-container rounded border border-outline-variant flex justify-between items-center">
              <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-secondary">description</span>
                <span class="font-label-md text-label-md">Document Updated</span>
              </div>
            </div>`;
        }

        const msgHTML = `
        <div class="flex gap-3 animate-fade-in-up">
          <div class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center shrink-0">
            <span class="material-symbols-outlined text-sm" style="font-variation-settings:'FILL' 1;">robot_2</span>
          </div>
          <div class="bg-surface-container-highest p-4 rounded-2xl rounded-tl-sm shadow-sm max-w-[85%] text-on-surface">
            <p>${text}</p>
            ${updateCard}
          </div>
        </div>`;
        chatHistory.insertAdjacentHTML('beforeend', msgHTML);
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    function addUserMessage(text) {
        const msgHTML = `
        <div class="flex gap-3 flex-row-reverse animate-fade-in-up">
          <div class="w-8 h-8 rounded-full bg-surface-variant text-on-surface flex items-center justify-center shrink-0">
             <span class="material-symbols-outlined text-sm">person</span>
          </div>
          <div class="bg-surface-container-low border border-outline-variant p-4 rounded-2xl rounded-tr-sm shadow-sm max-w-[85%] text-on-surface">
            <p>${text}</p>
          </div>
        </div>`;
        chatHistory.insertAdjacentHTML('beforeend', msgHTML);
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    function addLoadingBubble() {
        const msgHTML = `
        <div id="chat-loading" class="flex gap-3 animate-fade-in-up">
          <div class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center shrink-0">
            <span class="material-symbols-outlined text-sm animate-spin" style="animation: spin 1s linear infinite;">sync</span>
          </div>
          <div class="bg-surface-container-highest p-4 rounded-2xl rounded-tl-sm shadow-sm text-on-surface">
            <p class="text-on-surface-variant">Revising document...</p>
          </div>
        </div>`;
        chatHistory.insertAdjacentHTML('beforeend', msgHTML);
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    function removeLoadingBubble() {
        const loader = document.getElementById("chat-loading");
        if (loader) loader.remove();
    }


    document.addEventListener("DOMContentLoaded", () => {
        // 1. Initial Setup
        if (!sessionStorage.getItem("draftDocument")) {
            window.location.href = "EduAssistAI_LandingPage.html";
            return;
        }

        renderDocument();
        addAIMessage("Here is your drafted Daily Lesson Log. How would you like to refine it?");

        // 2. Hook up Download Button
        document.getElementById("download-btn").addEventListener("click", () => {
            const docBlob = dataURLtoBlob(sessionStorage.getItem("draftDocument"));
            const downloadUrl = window.URL.createObjectURL(docBlob);
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = "EduAssist_Generated_DLL.docx";
            document.body.appendChild(a);
            a.click();
            a.remove();
        });

        // 3. Hook up Chat Input
        const chatInput = document.getElementById("chat-input");
        const sendBtn = document.getElementById("send-btn");

        async function handleSend() {
            const text = chatInput.value.trim();
            if (!text) return;

            // Update UI
            chatInput.value = "";
            addUserMessage(text);
            addLoadingBubble();
            sendBtn.disabled = true;

            // Build the new super-prompt
            let currentContext = sessionStorage.getItem("documentContext");
            let newPrompt = currentContext + "\n\nUSER MODIFICATION REQUEST: " + text;

            try {
                // Build the payload
                const requestBody = { prompt: newPrompt };
                
                // If the user is logged in, attach their ID
                const currentUserId = localStorage.getItem("eduassist_user_id");
                if (currentUserId) {
                    requestBody.user_id = parseInt(currentUserId);
                }

                // Send to Python Backend
                const response = await fetch(BACKEND_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) throw new Error("Failed to refine document");

                // Get new file
                const blob = await response.blob();
                const base64data = await blobToBase64(blob);
                
                // Update Session Storage
                sessionStorage.setItem("draftDocument", base64data);
                sessionStorage.setItem("documentContext", newPrompt); 

                // Update UI
                removeLoadingBubble();
                renderDocument();
                addAIMessage(`I have updated the document to reflect your request: "${text}"`, true);

            } catch (error) {
                console.error(error);
                removeLoadingBubble();
                addAIMessage("Sorry, I ran into an error while trying to update the document. Please try again.");
            } finally {
                sendBtn.disabled = false;
            }
        }

        // Send on click
        sendBtn.addEventListener("click", handleSend);

        // Send on Enter key (Shift+Enter for new line)
        chatInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
    });
</script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // Find the form specifically inside the login modal
        const modalLoginForm = document.querySelector('#login-overlay form');
        
        if (modalLoginForm) {
            modalLoginForm.addEventListener('submit', async (e) => {
                e.preventDefault(); 
                
                // Smart select: Check for 'modal-email' first, fallback to 'email'
                const emailInput = document.getElementById('modal-email') || document.getElementById('email');
                const passwordInput = document.getElementById('modal-password') || document.getElementById('password');

                const userEmail = emailInput.value;
                const userPassword = passwordInput.value;

                // Change button state to show loading
                const submitBtn = modalLoginForm.querySelector('button[type="submit"]');
                const originalBtnText = submitBtn.innerHTML;
                submitBtn.innerHTML = `<span class="material-symbols-outlined animate-spin text-[20px]" style="animation: spin 1s linear infinite;">sync</span> Logging In...`;
                submitBtn.disabled = true;

                try {
                    // Send credentials to Python
                    const response = await fetch("http://127.0.0.1:8000/api/login", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email: userEmail, password: userPassword })
                    });
                    
                    const data = await response.json();

                    if (response.ok) {
                        // Save session variables
                        localStorage.setItem("eduassist_user_id", data.user_id);
                        localStorage.setItem("eduassist_first_name", data.first_name);
                        
                        // Reload the page to automatically switch the buttons to the Profile Icon
                        window.location.reload(); 
                    } else { 
                        alert(data.detail || "Login failed. Please check your credentials.");
                        submitBtn.innerHTML = originalBtnText;
                        submitBtn.disabled = false;
                    }
                } catch (error) {
                    console.error("Login Error:", error);
                    alert("Could not connect to the server. Is your Python backend running?");
                    submitBtn.innerHTML = originalBtnText;
                    submitBtn.disabled = false;
                }
            });
        }
    });
</script>
